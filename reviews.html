<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060D1A;
    font-family: 'Oswald', sans-serif;
    color: #E5E7EB;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .reviews-wrapper {
    max-width: 1100px;
    width: 100%;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── HEADER ── */
  .section-header {
    background: #0F172A;
    border-radius: 16px;
    padding: 48px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.08);
    font-size: 28px;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: #0F172A;
    border-radius: 16px;
    padding: 48px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-title {
    font-size: 26px;
    color: #3B82F6;
    margin-bottom: 4px;
  }

  .form-row {
    display: flex;
    gap: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .field-label {
    font-size: 14px;
    color: #94A3B8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .field-input,
  .field-textarea {
    background: #1E293B;
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    color: #E5E7EB;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field-input:focus,
  .field-textarea:focus {
    border-color: #3B82F6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  .field-textarea {
    resize: vertical;
    min-height: 110px;
  }

  /* Image upload */
  .upload-zone {
    background: #1E293B;
    border: 2px dashed rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover {
    border-color: #3B82F6;
    background: rgba(59,130,246,0.05);
  }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
  }
  .upload-text {
    color: #64748B;
    font-size: 15px;
  }
  .upload-text span { color: #3B82F6; }

  .preview-img {
    margin-top: 14px;
    border-radius: 10px;
    max-height: 200px;
    max-width: 100%;
    object-fit: cover;
    border: 1px solid rgba(59,130,246,0.2);
    display: none;
  }

  /* Stars */
  .stars-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .star-btn {
    font-size: 28px;
    cursor: pointer;
    color: #334155;
    transition: color 0.15s, transform 0.15s;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .star-btn:hover,
  .star-btn.active { color: #F59E0B; transform: scale(1.15); }

  /* Submit */
  .submit-btn {
    display: inline-block;
    padding: 16px 36px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #3B82F6;
    border: 2px solid #3B82F6;
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(59,130,246,0.3);
    transition: box-shadow 0.3s, transform 0.2s;
    align-self: flex-start;
  }
  .submit-btn:hover {
    box-shadow: 0 0 24px rgba(59,130,246,0.7);
    transform: scale(1.03);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .success-msg {
    display: none;
    color: #22C55E;
    font-size: 18px;
    padding: 14px 20px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 10px;
  }

  /* ── REVIEWS GRID ── */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .review-card {
    background: #0F172A;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.08);
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease both;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .review-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .review-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }

  .review-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .review-name {
    font-size: 20px;
    color: #3B82F6;
    font-weight: 600;
  }

  .review-stars {
    font-size: 18px;
    letter-spacing: 2px;
    color: #F59E0B;
  }

  .review-comment {
    font-size: 16px;
    color: #CBD5E1;
    line-height: 1.6;
  }

  .review-date {
    font-size: 13px;
    color: #475569;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .no-reviews {
    text-align: center;
    color: #475569;
    font-size: 18px;
    padding: 48px;
    background: #0F172A;
    border-radius: 16px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.06);
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 600px) and (max-width: 1024px) {
    .section-header, .form-card { padding: 32px; }
    .form-row { flex-direction: column; }
  }

  @media (max-width: 599px) {
    .section-header, .form-card { padding: 24px; }
    .form-row { flex-direction: column; }
    .submit-btn { align-self: stretch; text-align: center; }
    .reviews-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="reviews-wrapper">

  <!-- HEADER -->
  <div class="section-header">
    <span style="color:#3B82F6;">Відгуки</span> клієнтів — <span style="color:#22C55E;">реальні роботи</span>, реальні <span style="color:#F59E0B;">враження</span>
  </div>

  <!-- FORM -->
  <div class="form-card">
    <div class="form-title">Залишити відгук</div>

    <div class="form-row">
      <div class="field-group">
        <label class="field-label">Ваше ім'я</label>
        <input class="field-input" id="rev-name" type="text" placeholder="Наприклад: Олексій">
      </div>
      <div class="field-group">
        <label class="field-label">Оцінка</label>
        <div class="stars-row" id="stars-row">
          <button class="star-btn" data-val="1">★</button>
          <button class="star-btn" data-val="2">★</button>
          <button class="star-btn" data-val="3">★</button>
          <button class="star-btn" data-val="4">★</button>
          <button class="star-btn" data-val="5">★</button>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Коментар до вашого замовлення</label>
      <textarea class="field-textarea" id="rev-comment" placeholder="Розкажіть що сподобалось, яка тематика, наскільки задоволені результатом..."></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Прикріпити фото (мініатюра яку отримали)</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="rev-file" accept="image/*">
        <span class="upload-icon">📎</span>
        <div class="upload-text">Клікніть або перетягніть фото сюди<br><span>підтримуються JPG, PNG, WEBP</span></div>
        <img class="preview-img" id="preview-img" alt="preview">
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitReview()">ОПУБЛІКУВАТИ ВІДГУК</button>
    <div class="success-msg" id="success-msg">✓ Дякуємо! Ваш відгук опубліковано.</div>
  </div>

  <!-- REVIEWS SECTION TITLE -->
  <div class="section-header" style="font-size:22px;">
    <span style="color:#22C55E;">Відгуки</span> від замовників:
  </div>

  <!-- REVIEWS GRID -->
  <div class="reviews-grid" id="reviews-grid">
    <div class="no-reviews" id="no-reviews">Поки що немає відгуків. Будьте першим! 👆</div>
  </div>

</div>

<script>
  // ── STATE ──
  let selectedStars = 0;
  let imageBase64 = null;
  const STORAGE_KEY = 'mykhailo_reviews_v1';

  // ── STARS ──
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedStars = parseInt(btn.dataset.val);
      document.querySelectorAll('.star-btn').forEach((b, i) => {
        b.classList.toggle('active', i < selectedStars);
      });
    });
    btn.addEventListener('mouseover', () => {
      const v = parseInt(btn.dataset.val);
      document.querySelectorAll('.star-btn').forEach((b, i) => {
        b.style.color = i < v ? '#F59E0B' : '';
      });
    });
    btn.addEventListener('mouseout', () => {
      document.querySelectorAll('.star-btn').forEach((b, i) => {
        b.style.color = i < selectedStars ? '#F59E0B' : '';
      });
    });
  });

  // ── FILE UPLOAD ──
  document.getElementById('rev-file').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      imageBase64 = e.target.result;
      const img = document.getElementById('preview-img');
      img.src = imageBase64;
      img.style.display = 'block';
      document.querySelector('.upload-text').style.display = 'none';
      document.querySelector('.upload-icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // ── LOAD REVIEWS ──
  function loadReviews() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveReviews(reviews) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews)); } catch {}
  }

  // ── RENDER ──
  function renderReviews() {
    const reviews = loadReviews();
    const grid = document.getElementById('reviews-grid');
    const noRev = document.getElementById('no-reviews');

    if (reviews.length === 0) {
      grid.innerHTML = '<div class="no-reviews" id="no-reviews">Поки що немає відгуків. Будьте першим! 👆</div>';
      return;
    }

    grid.innerHTML = reviews.slice().reverse().map((r, i) => `
      <div class="review-card" style="animation-delay:${i * 0.07}s">
        ${r.image ? `<img class="review-thumb" src="${r.image}" alt="thumbnail">` : ''}
        <div class="review-body">
          <div class="review-header">
            <span class="review-name">${escHtml(r.name)}</span>
            <span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span>
          </div>
          ${r.comment ? `<div class="review-comment">${escHtml(r.comment)}</div>` : ''}
          <div class="review-date">${r.date}</div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── SUBMIT ──
  function submitReview() {
    const name = document.getElementById('rev-name').value.trim();
    const comment = document.getElementById('rev-comment').value.trim();

    if (!name) {
      document.getElementById('rev-name').focus();
      document.getElementById('rev-name').style.borderColor = '#EF4444';
      setTimeout(() => document.getElementById('rev-name').style.borderColor = '', 1500);
      return;
    }
    if (selectedStars === 0) {
      document.getElementById('stars-row').style.outline = '2px solid #EF4444';
      document.getElementById('stars-row').style.borderRadius = '6px';
      setTimeout(() => document.getElementById('stars-row').style.outline = '', 1500);
      return;
    }

    const review = {
      name,
      comment,
      stars: selectedStars,
      image: imageBase64 || null,
      date: new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' })
    };

    const reviews = loadReviews();
    reviews.push(review);
    saveReviews(reviews);

    // reset form
    document.getElementById('rev-name').value = '';
    document.getElementById('rev-comment').value = '';
    document.getElementById('rev-file').value = '';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('preview-img').src = '';
    document.querySelector('.upload-text').style.display = '';
    document.querySelector('.upload-icon').style.display = '';
    selectedStars = 0;
    imageBase64 = null;
    document.querySelectorAll('.star-btn').forEach(b => { b.classList.remove('active'); b.style.color = ''; });

    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);

    renderReviews();
  }

  // ── INIT ──
  renderReviews();
</script>
</body>
</html>
