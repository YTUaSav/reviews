<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1E293B;
    font-family: 'Oswald', sans-serif;
    color: #E5E7EB;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .reviews-wrapper {
    max-width: 1100px;
    width: 100%;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-header {
    background: #0F172A;
    border-radius: 16px;
    padding: 48px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.08);
    font-size: 28px;
  }

  .form-card {
    background: #0F172A;
    border-radius: 16px;
    padding: 48px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-title { font-size: 26px; color: #3B82F6; margin-bottom: 4px; }
  .form-row { display: flex; gap: 16px; }
  .field-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .field-label {
    font-size: 14px;
    color: #94A3B8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .field-input,
  .field-textarea {
    background: #1E293B;
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    color: #E5E7EB;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field-input:focus,
  .field-textarea:focus {
    border-color: #3B82F6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .field-textarea { resize: vertical; min-height: 110px; }

  .upload-zone {
    background: #1E293B;
    border: 2px dashed rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover { border-color: #3B82F6; background: rgba(59,130,246,0.05); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 36px; margin-bottom: 8px; display: block; }
  .upload-text { color: #64748B; font-size: 15px; }
  .upload-text span { color: #3B82F6; }

  .preview-img {
    margin-top: 14px;
    border-radius: 10px;
    max-height: 200px;
    max-width: 100%;
    object-fit: cover;
    border: 1px solid rgba(59,130,246,0.2);
    display: none;
  }

  .file-limit { font-size: 13px; color: #475569; margin-top: 6px; }
  .file-limit.error { color: #EF4444; }
  .file-limit.ok { color: #22C55E; }

  .stars-row { display: flex; gap: 8px; align-items: center; }
  .star-btn {
    font-size: 28px;
    cursor: pointer;
    color: #334155;
    transition: color 0.15s, transform 0.15s;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .star-btn:hover,
  .star-btn.active { color: #F59E0B; transform: scale(1.15); }

  .submit-row { display: flex; align-items: center; gap: 14px; }

  .submit-btn {
    padding: 16px 36px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #3B82F6;
    border: 2px solid #3B82F6;
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(59,130,246,0.3);
    transition: box-shadow 0.3s, transform 0.2s;
  }
  .submit-btn:hover { box-shadow: 0 0 24px rgba(59,130,246,0.7); transform: scale(1.03); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    display: none;
    width: 22px; height: 22px;
    border: 3px solid rgba(59,130,246,0.25);
    border-top-color: #3B82F6;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    display: none;
    font-size: 17px;
    padding: 14px 20px;
    border-radius: 10px;
  }
  .status-msg.success {
    color: #22C55E;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
  }
  .status-msg.error {
    color: #EF4444;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .review-card {
    background: #0F172A;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.08);
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease both;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .review-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .review-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .review-body { padding: 24px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .review-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .review-name { font-size: 20px; color: #3B82F6; font-weight: 600; }
  .review-stars { font-size: 18px; letter-spacing: 2px; color: #F59E0B; }
  .review-comment { font-size: 16px; color: #CBD5E1; line-height: 1.6; }
  .review-date {
    font-size: 13px; color: #475569;
    margin-top: auto; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .state-box {
    text-align: center;
    color: #475569;
    font-size: 18px;
    padding: 48px;
    background: #0F172A;
    border-radius: 16px;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.06);
  }

  @media (min-width: 600px) and (max-width: 1024px) {
    .section-header, .form-card { padding: 32px; }
    .form-row { flex-direction: column; }
  }
  @media (max-width: 599px) {
    .section-header, .form-card { padding: 24px; }
    .form-row { flex-direction: column; }
    .submit-btn { width: 100%; }
    .reviews-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="reviews-wrapper">

  <div class="section-header">
    <span style="color:#3B82F6;">Client Reviews</span> — <span style="color:#22C55E;">real work</span>, real <span style="color:#F59E0B;">impressions</span>
  </div>

  <div class="form-card">
    <div class="form-title">Leave a Review</div>

    <div class="form-row">
      <div class="field-group">
        <label class="field-label">Your Name</label>
        <input class="field-input" id="rev-name" type="text" placeholder="E.g.: Alex">
      </div>
      <div class="field-group">
        <label class="field-label">Rating</label>
        <div class="stars-row" id="stars-row">
          <button class="star-btn" data-val="1">★</button>
          <button class="star-btn" data-val="2">★</button>
          <button class="star-btn" data-val="3">★</button>
          <button class="star-btn" data-val="4">★</button>
          <button class="star-btn" data-val="5">★</button>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Comment about your order</label>
      <textarea class="field-textarea" id="rev-comment" placeholder="Tell us what you liked, the topic, how satisfied you are with the result..."></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Attach a photo — thumbnail you received (max 5MB)</label>
      <div class="upload-zone">
        <input type="file" id="rev-file" accept="image/*">
        <span class="upload-icon" id="upload-icon">📎</span>
        <div class="upload-text" id="upload-text">Click or drag a photo here<br><span>JPG, PNG, WEBP supported</span></div>
        <img class="preview-img" id="preview-img" alt="preview">
      </div>
      <div class="file-limit" id="file-limit">Optional — you can leave a review without a photo</div>
    </div>

    <div class="submit-row">
      <button class="submit-btn" id="submit-btn" onclick="submitReview()">PUBLISH REVIEW</button>
      <div class="spinner" id="spinner"></div>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <div class="section-header" style="font-size:22px;">
    <span style="color:#22C55E;">Reviews</span> from clients:
  </div>

  <div class="reviews-grid" id="reviews-grid">
    <div class="state-box">Loading reviews...</div>
  </div>

</div>
<script>
  // ── KEYS ──
  const CLOUD_NAME   = 'du4wnt7zj';
  const CLOUD_PRESET = 'UnSign';
  const JB_KEY       = '$2a$10$sdq4HxO.pWyE9dt.N2MX2.2otj94euVS1fXvUeoqT0Xc5HJ2EZj1.';
  const BIN_LS_KEY   = 'mykhailo_bin_id_v2';
  const MAX_BYTES    = 5 * 1024 * 1024;

  let selectedStars = 0;
  let selectedFile  = null;

  // ── STARS ──
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedStars = +btn.dataset.val;
      document.querySelectorAll('.star-btn').forEach((b,i) =>
        b.classList.toggle('active', i < selectedStars));
    });
    btn.addEventListener('mouseover', () => {
      const v = +btn.dataset.val;
      document.querySelectorAll('.star-btn').forEach((b,i) =>
        b.style.color = i < v ? '#F59E0B' : '');
    });
    btn.addEventListener('mouseout', () => {
      document.querySelectorAll('.star-btn').forEach((b,i) =>
        b.style.color = i < selectedStars ? '#F59E0B' : '');
    });
  });

  // ── FILE ──
  document.getElementById('rev-file').addEventListener('change', function() {
    const file = this.files[0];
    const lim  = document.getElementById('file-limit');
    if (!file) return;

    if (file.size > MAX_BYTES) {
      lim.textContent = '✗ File too large! Max 5MB.';
      lim.className = 'file-limit error';
      selectedFile = null;
      this.value = '';
      document.getElementById('preview-img').style.display = 'none';
      return;
    }

    selectedFile = file;
    lim.textContent = `✓ ${(file.size/1024/1024).toFixed(2)} MB — ready`;
    lim.className = 'file-limit ok';

    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('upload-text').style.display = 'none';
      document.getElementById('upload-icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // ── JSONBIN ──
  async function getBinId() {
    const cached = localStorage.getItem(BIN_LS_KEY);
    if (cached) return cached;

    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JB_KEY,
        'X-Bin-Name': 'mykhailo-reviews',
        'X-Bin-Private': 'false'
      },
      body: JSON.stringify({ reviews: [] })
    });
    const data = await res.json();
    const id = data.metadata.id;
    localStorage.setItem(BIN_LS_KEY, id);
    return id;
  }

  async function loadReviews() {
    const id  = await getBinId();
    const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
      headers: { 'X-Master-Key': JB_KEY }
    });
    const data = await res.json();
    return data.record.reviews || [];
  }

  async function saveReviews(reviews) {
    const id = await getBinId();
    await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JB_KEY },
      body: JSON.stringify({ reviews })
    });
  }

  // ── CLOUDINARY ──
  async function uploadImage(file) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUD_PRESET);
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: 'POST', body: fd
    });
    const data = await res.json();
    if (!data.secure_url) throw new Error('Cloudinary error');
    return data.secure_url;
  }

  // ── RENDER ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderReviews(reviews) {
    const grid = document.getElementById('reviews-grid');
    if (!reviews.length) {
      grid.innerHTML = '<div class="state-box">No reviews yet. Be the first! 👆</div>';
      return;
    }
    grid.innerHTML = reviews.slice().reverse().map((r,i) => `
      <div class="review-card" style="animation-delay:${i*0.07}s">
        ${r.image ? `<img class="review-thumb" src="${esc(r.image)}" alt="thumbnail">` : ''}
        <div class="review-body">
          <div class="review-header">
            <span class="review-name">${esc(r.name)}</span>
            <span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
          </div>
          ${r.comment ? `<div class="review-comment">${esc(r.comment)}</div>` : ''}
          <div class="review-date">${esc(r.date)}</div>
        </div>
      </div>`).join('');
  }

  function showStatus(type, text) {
    const el = document.getElementById('status-msg');
    el.className = `status-msg ${type}`;
    el.textContent = text;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  // ── SUBMIT ──
  async function submitReview() {
    const name    = document.getElementById('rev-name').value.trim();
    const comment = document.getElementById('rev-comment').value.trim();

    if (!name) {
      const el = document.getElementById('rev-name');
      el.style.borderColor = '#EF4444'; el.focus();
      setTimeout(() => el.style.borderColor = '', 1500);
      return;
    }
    if (!selectedStars) {
      const el = document.getElementById('stars-row');
      el.style.outline = '2px solid #EF4444'; el.style.borderRadius = '6px';
      setTimeout(() => el.style.outline = '', 1500);
      return;
    }

    const btn     = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'block';

    try {
      let imageUrl = null;
      if (selectedFile) {
        imageUrl = await uploadImage(selectedFile);
      }

      const reviews = await loadReviews();
      reviews.push({
        name, comment,
        stars: selectedStars,
        image: imageUrl,
        date: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })
      });
      await saveReviews(reviews);

      // reset
      document.getElementById('rev-name').value    = '';
      document.getElementById('rev-comment').value = '';
      document.getElementById('rev-file').value    = '';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('preview-img').src   = '';
      document.getElementById('upload-text').style.display = '';
      document.getElementById('upload-icon').style.display = '';
      document.getElementById('file-limit').textContent = 'Optional — you can leave a review without a photo';
      document.getElementById('file-limit').className   = 'file-limit';
      selectedStars = 0; selectedFile = null;
      document.querySelectorAll('.star-btn').forEach(b => { b.classList.remove('active'); b.style.color=''; });

      showStatus('success', '✓ Thank you! Your review has been published.');
      renderReviews(reviews);

    } catch(e) {
      console.error(e);
      showStatus('error', '✗ Something went wrong. Please try again.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  // ── INIT ──
  (async () => {
    try {
      const reviews = await loadReviews();
      renderReviews(reviews);
    } catch(e) {
      document.getElementById('reviews-grid').innerHTML =
        '<div class="state-box">Could not load reviews. Please refresh the page.</div>';
    }
  })();
</script>
</body>
</html>
